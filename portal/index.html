<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0a0e14">
<title>Client Portal — Baseline</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230a0e14'/%3E%3Ctext x='16' y='22' font-family='ui-monospace,Consolas,monospace' font-size='16' fill='%2322d3ee' text-anchor='middle'%3EB_%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="../styles.css">
</head>
<body class="dash-body">

<header class="site-header">
  <div class="wrap header-row">
    <a href="/" class="logo">Baseline<span class="cursor">_</span></a>
    <div class="dash-whoami" id="whoami" hidden>
      <span id="whoamiEmail"></span>
      <button type="button" class="btn btn-ghost btn-small" id="signOutBtn">Sign out</button>
    </div>
  </div>
</header>

<main class="wrap dash-main">

  <section id="loginView" class="dash-panel">
    <p class="eyebrow"><span class="n">Portal</span><span>Sign in</span></p>
    <h1>Client portal</h1>
    <p class="section-intro">Enter the email you used when booking to get a one-time magic link.</p>
    <form id="loginForm" class="dash-form-inline">
      <input id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email" required>
      <button type="submit" class="btn btn-primary">Send magic link</button>
    </form>
    <p class="form-status" id="loginStatus" role="status" aria-live="polite"></p>
  </section>

  <section id="dashboardView" hidden>

    <section class="dash-panel">
      <p class="eyebrow"><span class="n">01</span><span>My bookings</span></p>
      <h2>Your requests</h2>
      <div id="bookingsList" class="portal-bookings"></div>
      <p class="dash-empty" id="bookingsEmpty" hidden>No bookings found for this email yet.</p>
    </section>

    <section class="dash-panel">
      <p class="eyebrow"><span class="n">02</span><span>Invoices</span></p>
      <h2>Invoices</h2>
      <div class="table-scroll">
        <table class="dash-table" id="invoicesTable">
          <thead>
            <tr>
              <th>Description</th>
              <th>Amount</th>
              <th>Due</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="invoicesBody"></tbody>
        </table>
      </div>
      <p class="dash-empty" id="invoicesEmpty" hidden>No invoices yet.</p>
    </section>

  </section>

</main>

<script type="module" src="portal.js"></script>
</body>
</html>
